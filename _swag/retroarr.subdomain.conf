## Version 2024/01
# make sure that your retroarr container is named retroarr (or adjust $upstream_app below)
# make sure that your dns has a cname set for retroarr
#
# RetroArr serves plain http on 2727 inside the container. SWAG terminates TLS.
# SignalR lives under /hubs/progress and needs websocket upgrades.
# Emulator assets + rom streams can be large — buffering is disabled on those.

server {
    listen 443 ssl;
    listen [::]:443 ssl;

    server_name retroarr.*;

    include /config/nginx/ssl.conf;

    # ROMs can be several GB. Allow large uploads too (save states, bios).
    client_max_body_size 0;

    # Proxy timeouts for long-running scans and rom downloads.
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location / {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app retroarr;
        set $upstream_port 2727;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }

    location ~ ^/api {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app retroarr;
        set $upstream_port 2727;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;
    }

    # SignalR hub — needs websocket upgrade. proxy.conf already forwards
    # Upgrade/Connection headers, so reusing the same include is enough.
    location /hubs/ {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app retroarr;
        set $upstream_port 2727;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
    }

    # ROM streams and emulator assets — don't buffer, serve as-is.
    location ~ ^/api/v3/emulator/(assets|player|\d+/rom) {
        include /config/nginx/proxy.conf;
        include /config/nginx/resolver.conf;
        set $upstream_app retroarr;
        set $upstream_port 2727;
        set $upstream_proto http;
        proxy_pass $upstream_proto://$upstream_app:$upstream_port;

        proxy_buffering off;
        proxy_request_buffering off;
    }
}
